name: Update Homebrew tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  update-tap:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.workflow_run.head_branch }}"
          # If triggered by tag push, head_branch is the tag name
          if [ -z "$tag" ]; then
            tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag }}"

          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/kubo-${tag}-${target}.tar.gz"
            sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
            echo "SHA_$(echo $target | tr '-' '_')=$sha" >> "$GITHUB_ENV"
          done

      - name: Generate formula
        run: |
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          cat > kubo.rb <<FORMULA
          class Kubo < Formula
            desc "Isolated dev environments in Docker"
            homepage "https://github.com/Dorky-Robot/kubo"
            version "$version"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$base/kubo-${tag}-aarch64-apple-darwin.tar.gz"
                sha256 "$SHA_aarch64_apple_darwin"
              else
                url "$base/kubo-${tag}-x86_64-apple-darwin.tar.gz"
                sha256 "$SHA_x86_64_apple_darwin"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$base/kubo-${tag}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_aarch64_unknown_linux_gnu"
              else
                url "$base/kubo-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_x86_64_unknown_linux_gnu"
              end
            end

            def install
              bin.install "kubo"
            end

            test do
              system "#{bin}/kubo", "version"
            end
          end
          FORMULA

      - name: Update tap repo
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Dorky-Robot/homebrew-tap.git" tap
          cp kubo.rb tap/Formula/kubo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubo.rb
          git commit -m "kubo ${{ steps.release.outputs.version }}" || echo "No changes"
          git push
