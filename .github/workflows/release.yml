name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          name="kubo-${tag}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/kubo" "$name/"
          tar czf "${name}.tar.gz" "$name"
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: kubo-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" *.tar.gz --repo "$GITHUB_REPOSITORY"

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 sums
        run: |
          for f in kubo-*.tar.gz; do
            target=$(echo "$f" | sed "s/kubo-${GITHUB_REF_NAME}-//" | sed 's/\.tar\.gz//' | tr '-' '_')
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            echo "SHA_${target}=${sha}" >> "$GITHUB_ENV"
          done

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dorky-robot/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/Dorky-Robot/kubo/releases/download/${TAG}"

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/kubo.rb << FORMULA
          class Kubo < Formula
            desc "Isolated dev environments in Docker"
            homepage "https://github.com/Dorky-Robot/kubo"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/kubo-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              end

              on_intel do
                url "${BASE}/kubo-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/kubo-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              end

              on_intel do
                url "${BASE}/kubo-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "kubo"
            end

            test do
              system "#{bin}/kubo", "version"
            end
          end
          FORMULA

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubo.rb
          git commit -m "kubo ${VERSION}"
          git push
