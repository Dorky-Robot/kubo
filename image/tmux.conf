# kubo tmux — twilight theme
# ─────────────────────────────────────────────────────────────────────

# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Vi mode ───────────────────────────────────────────────────────────
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Splits (keep cwd) ────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Status bar (twilight) ─────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour245"
set -g status-left "#[fg=colour59,bold]󰡨 #S #[fg=colour240]│ "
set -g status-left-length 30
set -g status-right "#[fg=colour240]│ #[fg=colour103]%H:%M"
set -g status-right-length 20

setw -g window-status-format " #[fg=colour245]#I #W "
setw -g window-status-current-format " #[fg=colour103,bold]#I #W "
setw -g window-status-separator ""

# ── Pane borders ──────────────────────────────────────────────────────
set -g pane-border-style "fg=colour236"
set -g pane-active-border-style "fg=colour103"

# ── Messages ──────────────────────────────────────────────────────────
set -g message-style "bg=colour235,fg=colour143"
